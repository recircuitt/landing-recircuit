<section id="contacto" class="w-full bg-green-950 py-24 px-6 md:px-16 lg:px-24 text-white relative">

    <div class="max-w-xl mx-auto text-center flex flex-col gap-10">

        <!-- Encabezado del Formulario -->
        <div class="flex flex-col gap-3">
            <h2 class="text-3xl sm:text-4xl font-extrabold tracking-tight">
                ¿Listo para transformar el impacto tecnológico de tu organización?
            </h2>
            <p class="text-gray-300 max-w-md mx-auto text-base">
                Dejanos tus datos. Nuestro equipo técnico analizará tus requerimientos para diseñar una solución de
                hardware o software a medida.
            </p>
        </div>

        <form (submit)="sendEmail($event)"
            class="w-full flex flex-col gap-5 bg-green-900/40 p-6 sm:p-8 rounded-2xl border border-white/10 backdrop-blur-sm">

            <!-- Input 1: Nombre (Vertical) -->
            <div class="flex flex-col items-start gap-2">
                <label class="text-xs font-semibold text-green-400 uppercase tracking-wider pl-1">
                    Nombre Completo
                </label>
                <input type="text" placeholder="Ej. Iván Jauregui"
                    class="w-full bg-white text-gray-900 px-4 py-3 rounded-xl font-medium outline-none border-2 border-transparent focus:border-green-500 transition-all text-sm sm:text-base"
                    required>
            </div>

            <!-- Input 2: Email (Vertical) -->
            <div class="flex flex-col items-start gap-2">
                <label class="text-xs font-semibold text-green-400 uppercase tracking-wider pl-1">
                    Correo Electrónico
                </label>
                <input type="email" placeholder="ejemplo@empresa.com"
                    class="w-full bg-white text-gray-900 px-4 py-3 rounded-xl font-medium outline-none border-2 border-transparent focus:border-green-500 transition-all text-sm sm:text-base"
                    required>
            </div>

            <button type="submit"
                class="w-full mt-2 bg-green-700 hover:bg-green-600 active:bg-green-800 transition-colors duration-150 py-3.5 rounded-xl text-white font-bold text-base tracking-wide border border-green-600/30">
                Transformar mis componentes ahora
            </button>

        </form>

    </div>
</section>
